name: Codex Fix Review Feedback

on:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]' && github.event.label.name == 'codex-fix'
    runs-on: ubuntu-latest
    environment: prod
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Collect PR feedback
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr view "$PR_NUMBER" --json title,body,comments,reviews > /tmp/pr-feedback.json
          gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER/comments" --paginate > /tmp/pr-review-comments.json

      - name: Run Codex fix
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            PR #${{ github.event.pull_request.number }} 의 Codex 리뷰 피드백을 반영해 주세요.

            참고 파일:
            - /tmp/pr-feedback.json
            - /tmp/pr-review-comments.json

            작업 규칙:
            - 유효한 리뷰 피드백만 반영하세요.
            - 관련 없는 리팩터링은 하지 마세요.
            - 잘못된 리뷰라고 판단되는 항목은 코드 수정하지 마세요.
            - 기존 Spring Boot / JPA / Security 구조를 유지하세요.
            - API 응답은 ApiResponse<T> 규칙을 따르세요.
            - Entity를 API 응답으로 직접 노출하지 마세요.
            - 수정 후 ./gradlew test 를 실행하세요.
          safety-strategy: drop-sudo
          sandbox: workspace-write

      - name: Verify
        run: ./gradlew test

      - name: Push changes
        run: |
          if ! git diff --quiet; then
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git add -A
            git commit -m "fix: address Codex review feedback"
            git push
          fi
