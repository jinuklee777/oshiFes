name: Codex Issue to PR

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  implement:
    if: github.actor != 'github-actions[bot]' && github.event.label.name == 'codex-ready'
    runs-on: ubuntu-latest
    environment: prod
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Run Codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            GitHub Issue #${{ github.event.issue.number }} 를 구현해 주세요.

            제목:
            ${{ github.event.issue.title }}

            본문:
            ${{ github.event.issue.body }}

            작업 규칙:
            - 기존 Spring Boot / JPA / Security 구조를 따르세요.
            - API 응답은 ApiResponse<T> 규칙을 따르세요.
            - Entity를 API 응답으로 직접 노출하지 마세요.
            - 필요한 경우 테스트를 추가하거나 수정하세요.
            - 변경 범위를 이슈 요구사항에 집중하세요.
            - 검증으로 ./gradlew test 를 실행하세요.
          safety-strategy: drop-sudo
          sandbox: workspace-write

      - name: Verify
        run: ./gradlew test

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.AI_WORKFLOW_TOKEN }}
          base: main
          branch: codex/issue-${{ github.event.issue.number }}
          title: "Codex: ${{ github.event.issue.title }}"
          commit-message: "feat: implement issue #${{ github.event.issue.number }}"
          labels: |
            codex-review
          body: |
            ## 📍 PR 타입
            - [x] 기능 추가
            - [ ] 버그 수정
            - [ ] 의존성, 환경 변수, 빌드 관련 코드 업데이트
            - [ ] 기타 사소한 수정

            ## ❗️ 관련 이슈 링크
            Close #${{ github.event.issue.number }}

            ## 📌 개요
            Codex가 이슈 내용을 기반으로 자동 구현한 PR입니다.

            ## 🔁 변경 사항
            - 이슈 요구사항 구현
            - 관련 테스트/검증 수행

            ## 🤖 자동화 흐름
            1. `codex-review` 라벨로 Codex 1차 리뷰
            2. 수정이 필요하면 `codex-fix` 라벨 추가
            3. 최종 검증이 필요하면 `claude-final-review` 라벨 추가
