name: Codex Pull Request Review

on:
  pull_request:
    types: [opened, synchronize, labeled]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    if: contains(github.event.pull_request.labels.*.name, 'codex-review')
    runs-on: ubuntu-latest
    environment: prod
    timeout-minutes: 20

    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0

      - name: Pre-fetch base and head refs
        run: |
          git fetch --no-tags origin \
            ${{ github.event.pull_request.base.ref }} \
            +refs/pull/${{ github.event.pull_request.number }}/head

      - name: Run Codex review
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            이 Pull Request를 한국어로 코드 리뷰해 주세요.

            리뷰 대상:
            - PR #${{ github.event.pull_request.number }}
            - base: ${{ github.event.pull_request.base.ref }}
            - head: ${{ github.event.pull_request.head.ref }}

            중점 검토 항목:
            - 요구사항 충족 여부
            - 잠재적 버그와 예외 케이스
            - Spring Security / 인증 / 권한 위험
            - JPA Entity, Transaction, N+1 가능성
            - ApiResponse<T> 응답 규칙 준수
            - Entity 직접 노출 여부
            - 테스트 누락 여부
            - 기존 패턴과의 일관성

            코드는 수정하지 마세요.
            리뷰 코멘트로 남길 수 있게 간결하고 실행 가능한 피드백을 작성하세요.
            문제가 없으면 명확히 문제가 없다고 작성하세요.
          safety-strategy: drop-sudo
          sandbox: read-only

      - name: Post Codex review
        if: steps.run_codex.outputs.final-message != ''
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.run_codex.outputs.final-message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });
